<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams — World Cup 2026</title>
  <meta name="description" content="All 48 teams at FIFA World Cup 2026 — real flags, squads, FIFA rankings, confederation filter." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
<style>
/* ── EA FC Pack-open & Pitch animations ── */
@keyframes cardReveal{0%{opacity:0;transform:translateY(40px) scale(.85) rotateY(-30deg)}70%{transform:translateY(-6px) scale(1.04) rotateY(4deg)}100%{opacity:1;transform:translateY(0) scale(1) rotateY(0)}}
@keyframes playerChipIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}80%{transform:translate(-50%,-50%) scale(1.08)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes pitchGlow{0%,100%{box-shadow:0 0 30px rgba(46,204,113,.15)}50%{box-shadow:0 0 60px rgba(46,204,113,.35)}}

/* ── Team Viewer Modal ── */
#tv-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.92);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px 16px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .3s}
#tv-overlay.open{opacity:1;pointer-events:all}
#tv-modal{background:#0d0d18;border:1px solid rgba(255,255,255,.1);border-radius:16px;width:100%;max-width:880px;overflow:hidden;position:relative}
#tv-close{position:absolute;top:14px;right:16px;z-index:10;background:rgba(255,255,255,.08);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
#tv-close:hover{background:var(--accent)}

/* Header */
.tv-header{padding:28px 24px 20px;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden}
.tv-header-bg{position:absolute;inset:0;opacity:.12;filter:blur(40px);pointer-events:none}
.tv-flag-wrap{font-size:0;flex-shrink:0}
.tv-title{font-family:var(--font-display);font-size:2rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;line-height:1}
.tv-sub{color:var(--text-dim);font-size:.85rem;margin-top:4px}
.tv-badges{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.tv-badge{padding:3px 10px;border-radius:4px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:1px solid rgba(255,255,255,.15)}

/* Tabs */
.tv-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08);padding:0 24px}
.tv-tab{background:none;border:none;color:var(--text-dim);font-family:var(--font-display);font-size:.9rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;margin-bottom:-1px}
.tv-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tv-panel{padding:20px 24px 28px;display:none}
.tv-panel.active{display:block}

/* Pitch */
.tv-pitch-wrap{position:relative;border-radius:12px;overflow:hidden;background:linear-gradient(180deg,#2a7a3c 0%,#1e5e2c 48%,#2a7a3c 100%);border:2px solid rgba(255,255,255,.2);animation:pitchGlow 3s ease-in-out infinite}
.tv-pitch-inner{position:relative;height:480px}
.tv-pitch-wrap::before{content:'';position:absolute;inset:10px;border:2px solid rgba(255,255,255,.3);border-radius:4px;pointer-events:none;z-index:1}
.pitch-centre-line{position:absolute;left:10px;right:10px;top:50%;height:2px;background:rgba(255,255,255,.3)}
.pitch-centre-circle{position:absolute;left:50%;top:50%;width:100px;height:100px;border:2px solid rgba(255,255,255,.3);border-radius:50%;transform:translate(-50%,-50%)}
.pitch-penalty-top{position:absolute;left:50%;top:10px;width:180px;height:90px;border:2px solid rgba(255,255,255,.3);border-bottom:none;transform:translateX(-50%)}
.pitch-penalty-bot{position:absolute;left:50%;bottom:10px;width:180px;height:90px;border:2px solid rgba(255,255,255,.3);border-top:none;transform:translateX(-50%)}

/* Player chips */
.pc{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;z-index:5;opacity:0;animation:playerChipIn .5s ease forwards}
.pc-card{background:rgba(0,0,0,.8);border:1.5px solid rgba(255,255,255,.4);border-radius:10px;padding:5px 8px 4px;min-width:72px;transition:transform .18s,box-shadow .18s;backdrop-filter:blur(6px)}
.pc:hover .pc-card{transform:translateY(-4px) scale(1.06);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.pc-rating{font-family:var(--font-display);font-size:1.05rem;font-weight:900;line-height:1}
.pc-pos{font-size:.6rem;font-weight:700;text-transform:uppercase;opacity:.7;letter-spacing:.5px}
.pc-name{font-size:.68rem;font-weight:600;margin-top:2px;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.pc-club{font-size:.58rem;color:var(--text-dim);margin-top:1px;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.pc-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,.3);margin:0 auto 3px;display:block;background:#1e1e30}
.pc-gk .pc-card{border-color:#ffc107;box-shadow:0 0 8px rgba(255,193,7,.3)}
.pc-df .pc-card{border-color:#42a5f5;box-shadow:0 0 8px rgba(66,165,245,.3)}
.pc-mf .pc-card{border-color:#66bb6a;box-shadow:0 0 8px rgba(102,187,106,.3)}
.pc-fw .pc-card{border-color:#ef5350;box-shadow:0 0 8px rgba(239,83,80,.3)}
.pc-gk .pc-rating{color:#ffc107}
.pc-df .pc-rating{color:#42a5f5}
.pc-mf .pc-rating{color:#66bb6a}
.pc-fw .pc-rating{color:#ef5350}

/* Squad grid */
.tv-squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:4px}
.tv-player-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 10px;animation:cardReveal .4s ease backwards}
.tv-player-card:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15)}
.tv-pc-pos{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.tv-pc-name{font-weight:700;font-size:.88rem;line-height:1.2;margin-bottom:2px}
.tv-pc-club{font-size:.75rem;color:var(--text-dim)}
.tv-pc-pos.GK{color:#ffc107}.tv-pc-pos.DF{color:#42a5f5}.tv-pc-pos.MF{color:#66bb6a}.tv-pc-pos.FW{color:#ef5350}

/* Analysis panel */
.tv-scores-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.tv-score-box{flex:1;min-width:90px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 12px;text-align:center}
.tv-score-val{font-family:var(--font-display);font-size:1.6rem;font-weight:900;color:var(--accent);line-height:1}
.tv-score-lbl{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.tv-sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.tv-sw-title{font-family:var(--font-display);font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.tv-sw-title.green{color:#66bb6a}.tv-sw-title.red{color:#ef5350}
.tv-sw-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.tv-sw-list li{font-size:.82rem;line-height:1.4;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.03);border-left:3px solid rgba(255,255,255,.15)}
.tv-sw-list.green li{border-left-color:#66bb6a}.tv-sw-list.red li{border-left-color:#ef5350}

/* Pitch formation legend */
.tv-formation{text-align:center;font-family:var(--font-display);font-size:.8rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

/* Mobile responsive */
@media(max-width:600px){
  #tv-overlay{padding:56px 8px 8px}
  .tv-header{padding:20px 16px 16px;gap:12px}
  .tv-title{font-size:1.4rem}
  .tv-tabs{padding:0 8px}
  .tv-tab{padding:10px 12px;font-size:.78rem}
  .tv-panel{padding:14px 12px 20px}
  .tv-pitch-inner{height:360px}
  .pc-card{min-width:56px;padding:4px 5px 3px}
  .pc-name,.pc-club{max-width:60px;font-size:.6rem}
  .tv-squad-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .tv-sw-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav id="main-nav"></nav>

<div class="page-hero" style="padding:100px 40px 40px;max-width:1200px;margin:0 auto;">
  <span class="section-tag">All 48 Nations</span>
  <h1 class="section-title" style="font-size:2.5rem;margin-top:8px">The 2026 World Cup Teams</h1>
  <p class="section-desc">Click any team for full squad, stats, and analysis. Filter by confederation or search by name.</p>
</div>

<!-- Filter bar -->
<div style="max-width:1200px;margin:0 auto;padding:0 40px 32px;">
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
    <input id="teams-search" type="text" placeholder="Search teams, group, or confederation…"
      style="flex:1;min-width:220px;padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.9rem;" />
    <div id="conf-filters" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    <div style="display:flex;gap:8px;">
      <button id="view-conf-btn" class="view-btn active">By Confederation</button>
      <button id="view-group-btn" class="view-btn">By Group</button>
    </div>
  </div>
</div>

<div id="teams-grid" style="max-width:1200px;margin:0 auto;padding:0 40px 40px;"></div>

<footer id="footer"></footer>

<!-- Team Viewer Overlay -->
<div id="tv-overlay">
  <div id="tv-modal">
    <button id="tv-close" aria-label="Close">&#x2715;</button>
    <div class="tv-header" id="tv-header">
      <div class="tv-header-bg" id="tv-header-bg"></div>
      <div class="tv-flag-wrap" id="tv-flag-wrap"></div>
      <div>
        <div class="tv-title" id="tv-title"></div>
        <div class="tv-sub" id="tv-sub"></div>
        <div class="tv-badges" id="tv-badges"></div>
      </div>
    </div>
    <div class="tv-tabs">
      <button class="tv-tab active" data-panel="tv-lineup">&#x26BD; Lineup</button>
      <button class="tv-tab" data-panel="tv-squad">&#x1F465; Squad</button>
      <button class="tv-tab" data-panel="tv-analysis">&#x1F4CA; Analysis</button>
    </div>
    <div class="tv-panel active" id="tv-lineup"></div>
    <div class="tv-panel" id="tv-squad"></div>
    <div class="tv-panel" id="tv-analysis"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/predictions.js"></script>
<script src="js/shared.js"></script>
<script>
var teamsViewMode = "conf";
var activeConf = "ALL";
var searchQuery = "";

var CONF_FLAGS = { ALL:"🌍", UEFA:"🇪🇺", CONMEBOL:"🌎", CONCACAF:"🌎", AFC:"🌏", CAF:"🌍", OFC:"🌊" };

document.addEventListener("DOMContentLoaded", function() {
  buildNav("teams");
  buildFooter("footer");
  buildConfFilters();
  renderTeams();
  initSearch();
  initViewToggle();
  initTVOverlay();
});

function buildConfFilters() {
  var confs = ["ALL","UEFA","CONMEBOL","CONCACAF","AFC","CAF","OFC"];
  var container = document.getElementById("conf-filters");
  container.innerHTML = confs.map(function(c) {
    return '<button class="tab-btn conf-filter-btn' + (c==="ALL"?" active":"") + '" data-conf="' + c + '">' + CONF_FLAGS[c] + " " + c + "</button>";
  }).join("");
  container.querySelectorAll(".conf-filter-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      container.querySelectorAll(".conf-filter-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      activeConf = btn.dataset.conf;
      renderTeams();
    });
  });
}

function initViewToggle() {
  document.getElementById("view-conf-btn").addEventListener("click", function() {
    teamsViewMode = "conf";
    document.getElementById("view-conf-btn").classList.add("active");
    document.getElementById("view-group-btn").classList.remove("active");
    renderTeams();
  });
  document.getElementById("view-group-btn").addEventListener("click", function() {
    teamsViewMode = "group";
    document.getElementById("view-group-btn").classList.add("active");
    document.getElementById("view-conf-btn").classList.remove("active");
    renderTeams();
  });
}

function initSearch() {
  document.getElementById("teams-search").addEventListener("input", function(e) {
    searchQuery = e.target.value.toLowerCase().trim();
    renderTeams();
  });
}

function filteredTeams() {
  return TEAMS.filter(function(t) {
    var matchConf = activeConf === "ALL" || t.conf === activeConf;
    var matchSearch = !searchQuery ||
      t.name.toLowerCase().includes(searchQuery) ||
      t.conf.toLowerCase().includes(searchQuery) ||
      ("group " + t.group.toLowerCase()).includes(searchQuery);
    return matchConf && matchSearch;
  });
}

function renderTeams() {
  var container = document.getElementById("teams-grid");
  var teams = filteredTeams();
  if (teamsViewMode === "conf") renderByConf(container, teams);
  else renderByGroup(container, teams);
  container.querySelectorAll(".team-card").forEach(function(c) {
    c.addEventListener("click", function() { openTeamViewer(c.dataset.id); });
  });
}

function renderByConf(container, teams) {
  var confOrder = ["UEFA","CONMEBOL","CONCACAF","AFC","CAF","OFC"];
  var confNames = {
    UEFA:"🇪🇺 Europe (UEFA)", CONMEBOL:"🌎 South America (CONMEBOL)",
    CONCACAF:"🌎 North/Central America (CONCACAF)", AFC:"🌏 Asia (AFC)",
    CAF:"🌍 Africa (CAF)", OFC:"🌊 Oceania (OFC)"
  };
  var html = "";
  confOrder.forEach(function(conf) {
    var ct = teams.filter(function(t) { return t.conf === conf; });
    if (!ct.length) return;
    html += '<div class="conf-section"><h3 class="conf-title">' + confNames[conf] + " — " + ct.length + " teams</h3>" +
      '<div class="teams-row">' + ct.map(renderTeamCard).join("") + "</div></div>";
  });
  container.innerHTML = html || '<p style="color:var(--text-dim);text-align:center;padding:60px">No teams found.</p>';
}

function renderByGroup(container, teams) {
  var groups = Array.from(new Set(teams.map(function(t) { return t.group; }))).sort();
  var html = "";
  groups.forEach(function(g) {
    var gt = teams.filter(function(t) { return t.group === g; });
    html += '<div class="conf-section"><h3 class="conf-title">Group ' + g + "</h3>" +
      '<div class="group-table-view">' + gt.map(renderGroupRow).join("") + "</div></div>";
  });
  container.innerHTML = html || '<p style="color:var(--text-dim);text-align:center;padding:60px">No teams found.</p>';
}

function renderGroupRow(t) {
  var squad = SQUADS[t.id] || {};
  var badge = squad.status === "ANNOUNCED" ? "✅" : squad.status === "PRELIMINARY" ? "⚠️" : "❓";
  var sqCls = squad.status === "ANNOUNCED" ? "sq-confirmed" : squad.status === "PRELIMINARY" ? "sq-preliminary" : "sq-pending";
  return '<div class="team-card group-row-card" data-id="' + t.id + '" style="display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:10px;cursor:pointer;">' +
    flagImg(t.id, 40) +
    '<div style="flex:1"><div style="font-weight:700;font-size:1rem">' + t.name + "</div>" +
    '<div style="font-size:0.8rem;color:var(--text-dim)">' + t.conf + " &bull; FIFA #" + t.ranking + " &bull; Elo " + t.elo + "</div></div>" +
    '<span class="sq-badge ' + sqCls + '">' + badge + " " + squad.status + "</span>" +
    (t.isHost ? '<span class="host-badge">HOST</span>' : "") +
    "</div>";
}

function renderTeamCard(t) {
  var sq = Predictions.SQ[t.id];
  var score = (sq && sq.score) ? sq.score : 7.5;
  var top5 = (sq && sq.top5Count) ? sq.top5Count : 0;
  var stars = Math.min(5, Math.max(1, Math.round((score - 7.0) / 2.5 * 5)));
  var squad = SQUADS[t.id] || {};
  var badge = squad.status === "ANNOUNCED"
    ? '<span class="sq-badge sq-confirmed">&#x2713; Announced</span>'
    : squad.status === "PRELIMINARY"
    ? '<span class="sq-badge sq-preliminary">~ Preliminary</span>'
    : '<span class="sq-badge sq-pending">? Unannounced</span>';
  var starStr = "★".repeat(stars) + "☆".repeat(5 - stars);

  var teamPlayers = PLAYERS.filter(function(p) { return p.teamId === t.id; })
    .sort(function(a, b) { return b.rating - a.rating; })
    .slice(0, 3);
  var playerStrip = '';
  if (teamPlayers.length > 0) {
    playerStrip = '<div class="tc-players">' +
      teamPlayers.map(function(p) {
        var enc = encodeURIComponent(p.name);
        var src = PLAYER_PHOTOS[p.name] || ('https://ui-avatars.com/api/?name=' + enc + '&background=1e1e30&color=e5e5e5&size=80&bold=true&format=svg');
        var fb  = 'https://ui-avatars.com/api/?name=' + enc + '&background=1e1e30&color=e5e5e5&size=80&bold=true&format=svg';
        return '<div class="tc-player" title="' + p.name + '">' +
          '<img class="tc-player-img" src="' + src + '" onerror="this.src=\'' + fb + '\'" alt="' + p.name + '" />' +
          '<div class="tc-player-name">' + p.name.split(' ').pop() + '</div>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  return '<div class="team-card" data-id="' + t.id + '">' +
    (t.isHost ? '<span class="host-badge">HOST</span>' : "") +
    (t.isDebut ? '<span class="host-badge" style="background:var(--accent2)">DEBUT</span>' : "") +
    '<div class="team-flag-lg" style="font-size:0;">' + flagImg(t.id, 72) + "</div>" +
    '<div class="team-name">' + t.name + "</div>" +
    '<div class="team-group">Group ' + t.group + " &bull; FIFA #" + t.ranking + "</div>" +
    '<div class="team-top5">' + top5 + " top-5 league player" + (top5 !== 1 ? "s" : "") + "</div>" +
    '<div class="team-stars">' + starStr + "</div>" +
    badge +
    playerStrip + "</div>";
}

// ── Team Viewer ─────────────────────────────────────────────────
function initTVOverlay() {
  document.getElementById("tv-close").addEventListener("click", closeTeamViewer);
  document.getElementById("tv-overlay").addEventListener("click", function(e) {
    if (e.target === document.getElementById("tv-overlay")) closeTeamViewer();
  });
  document.querySelectorAll(".tv-tab").forEach(function(tab) {
    tab.addEventListener("click", function() {
      document.querySelectorAll(".tv-tab").forEach(function(t) { t.classList.remove("active"); });
      document.querySelectorAll(".tv-panel").forEach(function(p) { p.classList.remove("active"); });
      tab.classList.add("active");
      document.getElementById(tab.dataset.panel).classList.add("active");
    });
  });
  document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeTeamViewer(); });
}

function closeTeamViewer() {
  document.getElementById("tv-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function openTeamViewer(teamId) {
  var data = Predictions.getTeamAnalysis(teamId);
  if (!data) return;
  var team = data.team, players = data.players, awards = data.awards;
  var squad = data.squad, sq = data.sq, probableXI = data.probableXI;
  var composite = data.composite, strengths = data.strengths, weaknesses = data.weaknesses;

  // Header
  document.getElementById("tv-flag-wrap").innerHTML = flagImg(team.id, 64);
  document.getElementById("tv-title").textContent = team.name;
  document.getElementById("tv-sub").textContent =
    "Group " + team.group + " · FIFA #" + team.ranking + " · " + team.conf + " · Elo " + team.elo;

  var badgeHtml = '<span class="tv-badge" style="background:rgba(255,255,255,.06)">' +
    (team.isHost ? "🏟️ Host" : team.conf) + "</span>";
  if (squad.status === "ANNOUNCED")
    badgeHtml += '<span class="tv-badge" style="border-color:#66bb6a;color:#66bb6a">✅ Squad Confirmed</span>';
  else if (squad.status === "PRELIMINARY")
    badgeHtml += '<span class="tv-badge" style="border-color:#ffc107;color:#ffc107">⚠️ Preliminary</span>';
  else
    badgeHtml += '<span class="tv-badge">❓ Unannounced</span>';
  if (team.isDebut)
    badgeHtml += '<span class="tv-badge" style="border-color:var(--accent2);color:var(--accent2)">★ DEBUT</span>';
  document.getElementById("tv-badges").innerHTML = badgeHtml;

  // Reset tabs
  document.querySelectorAll(".tv-tab").forEach(function(t, i) { t.classList.toggle("active", i === 0); });
  document.querySelectorAll(".tv-panel").forEach(function(p, i) { p.classList.toggle("active", i === 0); });

  // Fill panels
  document.getElementById("tv-lineup").innerHTML = buildLineupPanel(probableXI, squad);
  document.getElementById("tv-squad").innerHTML = buildSquadPanel(players, squad, awards);
  document.getElementById("tv-analysis").innerHTML = buildAnalysisPanel(sq, composite, strengths, weaknesses);

  document.getElementById("tv-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function buildLineupPanel(probableXI, squad) {
  var slots = [
    {pos:"GK",x:50,y:88},{pos:"DF",x:18,y:72},{pos:"DF",x:39,y:72},{pos:"DF",x:61,y:72},{pos:"DF",x:82,y:72},
    {pos:"MF",x:25,y:52},{pos:"MF",x:50,y:50},{pos:"MF",x:75,y:52},
    {pos:"FW",x:20,y:28},{pos:"FW",x:50,y:22},{pos:"FW",x:80,y:28}
  ];
  var pitchHTML = "";
  if (probableXI && probableXI.players && probableXI.players.length >= 9) {
    var byPos = {GK:[],DF:[],MF:[],FW:[]};
    probableXI.players.forEach(function(p) { if (byPos[p.pos]) byPos[p.pos].push(p); });
    var placed = [];
    ["GK","DF","MF","FW"].forEach(function(pos) {
      slots.filter(function(s) { return s.pos === pos; }).forEach(function(sl, i) {
        var pl = byPos[pos][i];
        if (pl) placed.push({name:pl.name,pos:pl.pos,rating:pl.rating,club:pl.club,x:sl.x,y:sl.y});
      });
    });
    pitchHTML = placed.map(function(p, i) {
      var cls = "pc pc-" + p.pos.toLowerCase();
      var photo = (typeof getPlayerPhoto === 'function') ? getPlayerPhoto(p.name) : { src: '', fallback: '' };
      return '<div class="' + cls + '" style="left:' + p.x + '%;top:' + p.y + '%;animation-delay:' + (i*60) + 'ms">' +
        '<div class="pc-card">' +
        '<img class="pc-photo" src="' + photo.src + '" onerror="this.src=\'' + photo.fallback + '\'" alt="' + p.name + '" />' +
        '<div class="pc-rating">' + p.rating + "</div>" +
        '<div class="pc-pos">' + p.pos + "</div>" +
        '<div class="pc-name">' + p.name + "</div>" +
        '<div class="pc-club">' + p.club + "</div>" +
        "</div></div>";
    }).join("");
  } else {
    pitchHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:.9rem;text-align:center;padding:20px">' +
      "Probable XI unavailable.<br>Awaiting squad announcement.</div>";
  }
  var squadLabel = squad.status === "ANNOUNCED"
    ? "Rating-based from " + (squad.players ? squad.players.length : "?") + "-player official squad"
    : "Projected — squad not yet announced";
  return '<div class="tv-formation">4-3-3 · ' + squadLabel + "</div>" +
    '<div class="tv-pitch-wrap"><div class="tv-pitch-inner">' +
    '<div class="pitch-centre-line"></div>' +
    '<div class="pitch-centre-circle"></div>' +
    '<div class="pitch-penalty-top"></div>' +
    '<div class="pitch-penalty-bot"></div>' +
    pitchHTML + "</div></div>";
}

function buildSquadPanel(players, squad, awards) {
  var positions = ["GK","DF","MF","FW"];
  var posNames = {GK:"Goalkeepers", DF:"Defenders", MF:"Midfielders", FW:"Forwards"};
  var html = "";

  var sourceList = (squad.players && squad.players.length) ? squad.players : null;

  if (sourceList) {
    positions.forEach(function(pos) {
      var group = sourceList.filter(function(p) { return p.pos === pos; });
      if (!group.length) return;
      html += '<div style="margin-bottom:18px">' +
        '<div class="tv-pc-pos ' + pos + '" style="margin-bottom:8px;font-size:.8rem;letter-spacing:.5px">' + posNames[pos] + "</div>" +
        '<div class="tv-squad-grid">' +
        group.map(function(p, i) {
          var tracked = players.find(function(tp) { return tp.name.toLowerCase() === p.name.toLowerCase(); });
          var lm = LEAGUE_META[p.league] || LEAGUE_META["Other"];
          var statsRow = tracked
            ? '<div style="margin-top:6px;font-size:.72rem;color:var(--text-dim)">⭐ ' + tracked.rating +
              (tracked.goals ? " · ⚽ " + tracked.goals + "G " + tracked.assists + "A" : tracked.cs ? " · 🧤 " + tracked.cs + " CS" : "") + "</div>"
            : "";
          return '<div class="tv-player-card" style="animation-delay:' + (i*30) + 'ms">' +
            '<div class="tv-pc-pos ' + pos + '">' + pos + "</div>" +
            '<div class="tv-pc-name">' + p.name + "</div>" +
            '<img style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.15);margin:4px 0;" src="' + (typeof getPlayerPhoto === 'function' ? getPlayerPhoto(p.name).src : '') + '" onerror="this.src=\'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name) + '&background=1e1e30&color=e5e5e5&size=80&bold=true&format=svg\'" alt="" />' +
            '<div class="tv-pc-club">' + (lm.nation || "") + " " + p.club + "</div>" +
            statsRow + "</div>";
        }).join("") +
        "</div></div>";
    });
  } else if (players.length) {
    positions.forEach(function(pos) {
      var group = players.filter(function(p) { return p.pos === pos; });
      if (!group.length) return;
      var lm_fn = function(p) { return LEAGUE_META[p.league] || LEAGUE_META["Other"]; };
      html += '<div style="margin-bottom:18px">' +
        '<div class="tv-pc-pos ' + pos + '" style="margin-bottom:8px;font-size:.8rem">' + posNames[pos] + " (tracked players only)</div>" +
        '<div class="tv-squad-grid">' +
        group.map(function(p, i) {
          var lm = lm_fn(p);
          return '<div class="tv-player-card" style="animation-delay:' + (i*30) + 'ms">' +
            '<div class="tv-pc-pos ' + pos + '">' + pos + "</div>" +
            '<div class="tv-pc-name">' + p.name + "</div>" +
            '<img style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.15);margin:4px 0;" src="' + (typeof getPlayerPhoto === 'function' ? getPlayerPhoto(p.name).src : '') + '" onerror="this.src=\'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.name) + '&background=1e1e30&color=e5e5e5&size=80&bold=true&format=svg\'" alt="" />' +
            '<div class="tv-pc-club">' + (lm.nation || "") + " " + p.club + "</div>" +
            '<div style="margin-top:6px;font-size:.72rem;color:var(--text-dim)">⭐ ' + p.rating +
            (p.goals ? " · ⚽ " + p.goals + "G " + p.assists + "A" : p.cs ? " · 🧤 " + p.cs + " CS" : "") + "</div>" +
            "</div>";
        }).join("") +
        "</div></div>";
    });
  } else {
    html = '<p style="color:var(--text-dim);padding:20px 0">Squad data not yet available.</p>';
  }

  if (awards && awards.length) {
    html += '<div style="margin-top:20px;border-top:1px solid rgba(255,255,255,.08);padding-top:16px">' +
      '<div class="tv-sw-title green" style="margin-bottom:10px">🏆 Season Honours</div>' +
      awards.map(function(a) {
        return '<div style="font-size:.82rem;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)">🏅 <b>' +
          a.award + "</b>" + (a.winner ? " — " + a.winner : "") + "</div>";
      }).join("") + "</div>";
  }
  return html;
}

function buildAnalysisPanel(sq, composite, strengths, weaknesses) {
  var titlePct = Math.round(composite * composite * 100);
  var label = composite > 0.76 ? "Strong Contender" : composite > 0.60 ? "Dark Horse" : composite > 0.42 ? "Possible Upset" : "Group Stage Exit Likely";
  var swHtml = '<div class="tv-sw-grid">' +
    '<div><div class="tv-sw-title green">Strengths</div><ul class="tv-sw-list green">' +
    (strengths.length ? strengths.map(function(s) { return "<li>" + s + "</li>"; }).join("") : "<li>—</li>") +
    '</ul></div>' +
    '<div><div class="tv-sw-title red">Concerns</div><ul class="tv-sw-list red">' +
    (weaknesses.length ? weaknesses.map(function(w) { return "<li>" + w + "</li>"; }).join("") : "<li>—</li>") +
    "</ul></div></div>";
  return '<div class="tv-scores-row">' +
    '<div class="tv-score-box"><div class="tv-score-val">' + sq.score.toFixed(2) + '</div><div class="tv-score-lbl">Squad Score</div></div>' +
    '<div class="tv-score-box"><div class="tv-score-val">' + Math.round(composite*100) + '%</div><div class="tv-score-lbl">Composite</div></div>' +
    '<div class="tv-score-box"><div class="tv-score-val">' + sq.top5Count + '</div><div class="tv-score-lbl">Top-5 League</div></div>' +
    '<div class="tv-score-box"><div class="tv-score-val">' + titlePct + '%</div><div class="tv-score-lbl">Title Chance</div></div>' +
    '</div>' +
    '<div style="text-align:center;margin-bottom:20px"><span style="display:inline-block;padding:6px 18px;border-radius:20px;font-family:var(--font-display);font-size:.85rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(200,168,75,.15);border:1px solid rgba(200,168,75,.4);color:var(--accent)">' + label + "</span></div>" +
    swHtml;
}
</script>
</body>
</html>
